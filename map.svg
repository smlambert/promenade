<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600"
     role="img" aria-label="Map of The Promenade planting site at Miner's Point">
  <title>The Promenade – Miner's Point Planting Site Map</title>
  <desc>A map showing the layout of fruit tree plantings along The Promenade at Miner's Point.</desc>

  <!-- Background: grassy park area -->
  <rect width="900" height="600" fill="#c8e6a0" rx="8"/>

  <!-- Water / bay edge at the bottom -->
  <ellipse cx="450" cy="670" rx="560" ry="180" fill="#a0c8e6" opacity="0.6"/>
  <text x="450" y="570" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2255aa" font-style="italic">San Francisco Bay</text>

  <!-- Main promenade path (paved walkway) -->
  <rect x="60" y="260" width="780" height="30" fill="#d0c9b0" rx="4" stroke="#b0a888" stroke-width="1.5"/>
  <text x="450" y="281" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">The Promenade Walkway</text>

  <!-- Cross-path 1 -->
  <rect x="200" y="120" width="24" height="170" fill="#d0c9b0" rx="3" stroke="#b0a888" stroke-width="1"/>
  <!-- Cross-path 2 -->
  <rect x="440" y="120" width="24" height="170" fill="#d0c9b0" rx="3" stroke="#b0a888" stroke-width="1"/>
  <!-- Cross-path 3 -->
  <rect x="680" y="120" width="24" height="170" fill="#d0c9b0" rx="3" stroke="#b0a888" stroke-width="1"/>

  <!-- Cross-path 1 south -->
  <rect x="200" y="290" width="24" height="180" fill="#d0c9b0" rx="3" stroke="#b0a888" stroke-width="1"/>
  <!-- Cross-path 2 south -->
  <rect x="440" y="290" width="24" height="180" fill="#d0c9b0" rx="3" stroke="#b0a888" stroke-width="1"/>
  <!-- Cross-path 3 south -->
  <rect x="680" y="290" width="24" height="180" fill="#d0c9b0" rx="3" stroke="#b0a888" stroke-width="1"/>

  <!-- ===== NORTH BEDS (above walkway) ===== -->

  <!-- North-West bed border -->
  <rect x="70" y="110" width="260" height="140" fill="#b8d990" rx="6" stroke="#6a9a40" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="200" y="128" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#3a6020" font-weight="bold">North-West Bed</text>

  <!-- North-Center bed border -->
  <rect x="310" y="110" width="260" height="140" fill="#b8d990" rx="6" stroke="#6a9a40" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="440" y="128" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#3a6020" font-weight="bold">North-Center Bed</text>

  <!-- North-East bed border -->
  <rect x="550" y="110" width="260" height="140" fill="#b8d990" rx="6" stroke="#6a9a40" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="680" y="128" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#3a6020" font-weight="bold">North-East Bed</text>

  <!-- ===== SOUTH BEDS (below walkway) ===== -->

  <!-- South-West bed border -->
  <rect x="70" y="300" width="260" height="140" fill="#b8d990" rx="6" stroke="#6a9a40" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="200" y="318" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#3a6020" font-weight="bold">South-West Bed</text>

  <!-- South-Center bed border -->
  <rect x="310" y="300" width="260" height="140" fill="#b8d990" rx="6" stroke="#6a9a40" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="440" y="318" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#3a6020" font-weight="bold">South-Center Bed</text>

  <!-- South-East bed border -->
  <rect x="550" y="300" width="260" height="140" fill="#b8d990" rx="6" stroke="#6a9a40" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="680" y="318" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#3a6020" font-weight="bold">South-East Bed</text>

  <!-- ===== TREE SYMBOLS ===== -->
  <!-- Each tree: circle (canopy) + dot (trunk) + label -->

  <!-- Helper macro-like group style: canopy fill varies by tree type -->
  <!-- Apple = #4caf50, Pear = #aed645, Cherry = #e57373, Plum = #ab47bc,
       Peach = #ffa726, Apricot = #ffca28, Fig = #8d6e63, Mulberry = #7e57c2,
       Quince = #ef9a9a, Asian Pear = #c5e1a5, Lemon = #fff176, Persimmon = #ff7043 -->

  <!-- ===== NORTH-WEST BED ===== -->
  <!-- T1: Apple – Fuji -->
  <g id="tree-1">
    <circle cx="110" cy="175" r="20" fill="#4caf50" stroke="#2e7d32" stroke-width="1.5" opacity="0.85"/>
    <circle cx="110" cy="175" r="4" fill="#1b5e20"/>
    <text x="110" y="210" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1b3a10">T1 Apple</text>
  </g>
  <!-- T2: Apple – Gravenstein -->
  <g id="tree-2">
    <circle cx="155" cy="175" r="20" fill="#4caf50" stroke="#2e7d32" stroke-width="1.5" opacity="0.85"/>
    <circle cx="155" cy="175" r="4" fill="#1b5e20"/>
    <text x="155" y="210" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1b3a10">T2 Apple</text>
  </g>
  <!-- T3: Pear – Bartlett -->
  <g id="tree-3">
    <circle cx="280" cy="165" r="18" fill="#aed645" stroke="#7cb342" stroke-width="1.5" opacity="0.85"/>
    <circle cx="280" cy="165" r="4" fill="#33691e"/>
    <text x="280" y="197" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1b3a10">T3 Pear</text>
  </g>
  <!-- T4: Pear – Bosc -->
  <g id="tree-4">
    <circle cx="320" cy="165" r="18" fill="#aed645" stroke="#7cb342" stroke-width="1.5" opacity="0.85"/>
    <circle cx="320" cy="165" r="4" fill="#33691e"/>
    <text x="320" y="197" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1b3a10">T4 Pear</text>
  </g>
  <!-- T5: Cherry – Bing -->
  <g id="tree-5">
    <circle cx="110" cy="140" r="17" fill="#e57373" stroke="#c62828" stroke-width="1.5" opacity="0.85"/>
    <circle cx="110" cy="140" r="4" fill="#7f0000"/>
    <text x="110" y="171" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5a0000">T5 Cherry</text>
  </g>

  <!-- ===== NORTH-CENTER BED ===== -->
  <!-- T6: Peach – Redhaven -->
  <g id="tree-6">
    <circle cx="365" cy="175" r="19" fill="#ffa726" stroke="#e65100" stroke-width="1.5" opacity="0.85"/>
    <circle cx="365" cy="175" r="4" fill="#bf360c"/>
    <text x="365" y="207" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4a1800">T6 Peach</text>
  </g>
  <!-- T7: Peach – Elberta -->
  <g id="tree-7">
    <circle cx="410" cy="175" r="19" fill="#ffa726" stroke="#e65100" stroke-width="1.5" opacity="0.85"/>
    <circle cx="410" cy="175" r="4" fill="#bf360c"/>
    <text x="410" y="207" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4a1800">T7 Peach</text>
  </g>
  <!-- T8: Plum – Santa Rosa -->
  <g id="tree-8">
    <circle cx="490" cy="165" r="18" fill="#ab47bc" stroke="#7b1fa2" stroke-width="1.5" opacity="0.85"/>
    <circle cx="490" cy="165" r="4" fill="#4a148c"/>
    <text x="490" y="196" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#2a0050">T8 Plum</text>
  </g>
  <!-- T9: Apricot – Moorpark -->
  <g id="tree-9">
    <circle cx="365" cy="140" r="17" fill="#ffca28" stroke="#f57f17" stroke-width="1.5" opacity="0.85"/>
    <circle cx="365" cy="140" r="4" fill="#e65100"/>
    <text x="365" y="170" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4a1800">T9 Apricot</text>
  </g>
  <!-- T10: Apricot – Blenheim -->
  <g id="tree-10">
    <circle cx="415" cy="140" r="17" fill="#ffca28" stroke="#f57f17" stroke-width="1.5" opacity="0.85"/>
    <circle cx="415" cy="140" r="4" fill="#e65100"/>
    <text x="415" y="170" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4a1800">T10 Apricot</text>
  </g>

  <!-- ===== NORTH-EAST BED ===== -->
  <!-- T11: Fig – Brown Turkey -->
  <g id="tree-11">
    <circle cx="600" cy="175" r="20" fill="#8d6e63" stroke="#4e342e" stroke-width="1.5" opacity="0.85"/>
    <circle cx="600" cy="175" r="4" fill="#3e2723"/>
    <text x="600" y="208" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1a0f0a">T11 Fig</text>
  </g>
  <!-- T12: Fig – Black Mission -->
  <g id="tree-12">
    <circle cx="645" cy="175" r="20" fill="#8d6e63" stroke="#4e342e" stroke-width="1.5" opacity="0.85"/>
    <circle cx="645" cy="175" r="4" fill="#3e2723"/>
    <text x="645" y="208" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1a0f0a">T12 Fig</text>
  </g>
  <!-- T13: Mulberry – Red -->
  <g id="tree-13">
    <circle cx="780" cy="165" r="18" fill="#7e57c2" stroke="#4527a0" stroke-width="1.5" opacity="0.85"/>
    <circle cx="780" cy="165" r="4" fill="#1a0072"/>
    <text x="780" y="196" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#0f0040">T13 Mulberry</text>
  </g>
  <!-- T14: Quince -->
  <g id="tree-14">
    <circle cx="600" cy="140" r="17" fill="#ef9a9a" stroke="#c62828" stroke-width="1.5" opacity="0.85"/>
    <circle cx="600" cy="140" r="4" fill="#7f0000"/>
    <text x="600" y="170" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5a0000">T14 Quince</text>
  </g>
  <!-- T15: Asian Pear – 20th Century -->
  <g id="tree-15">
    <circle cx="740" cy="155" r="18" fill="#c5e1a5" stroke="#7cb342" stroke-width="1.5" opacity="0.85"/>
    <circle cx="740" cy="155" r="4" fill="#33691e"/>
    <text x="740" y="186" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1b3a10">T15 Asian Pear</text>
  </g>

  <!-- ===== SOUTH-WEST BED ===== -->
  <!-- T16: Lemon – Eureka -->
  <g id="tree-16">
    <circle cx="110" cy="360" r="17" fill="#fff176" stroke="#f9a825" stroke-width="1.5" opacity="0.85"/>
    <circle cx="110" cy="360" r="4" fill="#f57f17"/>
    <text x="110" y="390" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4a1800">T16 Lemon</text>
  </g>
  <!-- T17: Lemon – Meyer -->
  <g id="tree-17">
    <circle cx="155" cy="360" r="17" fill="#fff176" stroke="#f9a825" stroke-width="1.5" opacity="0.85"/>
    <circle cx="155" cy="360" r="4" fill="#f57f17"/>
    <text x="155" y="390" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4a1800">T17 Lemon</text>
  </g>
  <!-- T18: Persimmon – Fuyu -->
  <g id="tree-18">
    <circle cx="280" cy="355" r="19" fill="#ff7043" stroke="#bf360c" stroke-width="1.5" opacity="0.85"/>
    <circle cx="280" cy="355" r="4" fill="#7f2800"/>
    <text x="280" y="387" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4a1800">T18 Persimmon</text>
  </g>
  <!-- T19: Apple – Pink Lady -->
  <g id="tree-19">
    <circle cx="110" cy="410" r="20" fill="#4caf50" stroke="#2e7d32" stroke-width="1.5" opacity="0.85"/>
    <circle cx="110" cy="410" r="4" fill="#1b5e20"/>
    <text x="110" y="443" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1b3a10">T19 Apple</text>
  </g>
  <!-- T20: Cherry – Rainier -->
  <g id="tree-20">
    <circle cx="155" cy="415" r="17" fill="#e57373" stroke="#c62828" stroke-width="1.5" opacity="0.85"/>
    <circle cx="155" cy="415" r="4" fill="#7f0000"/>
    <text x="155" y="445" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5a0000">T20 Cherry</text>
  </g>

  <!-- ===== SOUTH-CENTER BED ===== -->
  <!-- T21: Plum – Elephant Heart -->
  <g id="tree-21">
    <circle cx="365" cy="360" r="18" fill="#ab47bc" stroke="#7b1fa2" stroke-width="1.5" opacity="0.85"/>
    <circle cx="365" cy="360" r="4" fill="#4a148c"/>
    <text x="365" y="390" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#2a0050">T21 Plum</text>
  </g>
  <!-- T22: Nectarine – Fantasia -->
  <g id="tree-22">
    <circle cx="415" cy="360" r="18" fill="#ffa726" stroke="#e65100" stroke-width="1.5" opacity="0.85"/>
    <circle cx="415" cy="360" r="4" fill="#bf360c"/>
    <text x="415" y="390" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4a1800">T22 Nectarine</text>
  </g>
  <!-- T23: Pear – D'Anjou -->
  <g id="tree-23">
    <circle cx="490" cy="350" r="18" fill="#aed645" stroke="#7cb342" stroke-width="1.5" opacity="0.85"/>
    <circle cx="490" cy="350" r="4" fill="#33691e"/>
    <text x="490" y="381" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1b3a10">T23 Pear</text>
  </g>
  <!-- T24: Apple – Honeycrisp -->
  <g id="tree-24">
    <circle cx="365" cy="410" r="20" fill="#4caf50" stroke="#2e7d32" stroke-width="1.5" opacity="0.85"/>
    <circle cx="365" cy="410" r="4" fill="#1b5e20"/>
    <text x="365" y="443" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1b3a10">T24 Apple</text>
  </g>
  <!-- T25: Pomegranate -->
  <g id="tree-25">
    <circle cx="490" cy="410" r="17" fill="#ef5350" stroke="#b71c1c" stroke-width="1.5" opacity="0.85"/>
    <circle cx="490" cy="410" r="4" fill="#7f0000"/>
    <text x="490" y="440" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5a0000">T25 Pomegranate</text>
  </g>

  <!-- ===== SOUTH-EAST BED ===== -->
  <!-- T26: Mulberry – White -->
  <g id="tree-26">
    <circle cx="600" cy="360" r="18" fill="#7e57c2" stroke="#4527a0" stroke-width="1.5" opacity="0.85"/>
    <circle cx="600" cy="360" r="4" fill="#1a0072"/>
    <text x="600" y="390" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#0f0040">T26 Mulberry</text>
  </g>
  <!-- T27: Persimmon – Hachiya -->
  <g id="tree-27">
    <circle cx="650" cy="360" r="19" fill="#ff7043" stroke="#bf360c" stroke-width="1.5" opacity="0.85"/>
    <circle cx="650" cy="360" r="4" fill="#7f2800"/>
    <text x="650" y="392" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4a1800">T27 Persimmon</text>
  </g>
  <!-- T28: Olive (fruiting) -->
  <g id="tree-28">
    <circle cx="780" cy="355" r="17" fill="#aed645" stroke="#558b2f" stroke-width="1.5" opacity="0.85"/>
    <circle cx="780" cy="355" r="4" fill="#33691e"/>
    <text x="780" y="385" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1b3a10">T28 Olive</text>
  </g>
  <!-- T29: Apple – Sierra Beauty -->
  <g id="tree-29">
    <circle cx="600" cy="415" r="20" fill="#4caf50" stroke="#2e7d32" stroke-width="1.5" opacity="0.85"/>
    <circle cx="600" cy="415" r="4" fill="#1b5e20"/>
    <text x="600" y="448" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1b3a10">T29 Apple</text>
  </g>
  <!-- T30: Lime – Persian -->
  <g id="tree-30">
    <circle cx="780" cy="415" r="17" fill="#b5e61d" stroke="#558b2f" stroke-width="1.5" opacity="0.85"/>
    <circle cx="780" cy="415" r="4" fill="#33691e"/>
    <text x="780" y="445" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1b3a10">T30 Lime</text>
  </g>

  <!-- ===== LEGEND ===== -->
  <rect x="60" y="490" width="780" height="80" fill="white" fill-opacity="0.75" rx="6" stroke="#aaa" stroke-width="1"/>
  <text x="450" y="508" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#333">Tree Type Legend</text>

  <circle cx="95"  cy="525" r="8" fill="#4caf50" stroke="#2e7d32" stroke-width="1"/>
  <text   x="108" cy="525" y="529" font-family="sans-serif" font-size="11" fill="#333">Apple</text>

  <circle cx="175" cy="525" r="8" fill="#aed645" stroke="#7cb342" stroke-width="1"/>
  <text   x="188" cy="525" y="529" font-family="sans-serif" font-size="11" fill="#333">Pear / Asian Pear</text>

  <circle cx="320" cy="525" r="8" fill="#e57373" stroke="#c62828" stroke-width="1"/>
  <text   x="333" cy="525" y="529" font-family="sans-serif" font-size="11" fill="#333">Cherry</text>

  <circle cx="420" cy="525" r="8" fill="#ab47bc" stroke="#7b1fa2" stroke-width="1"/>
  <text   x="433" cy="525" y="529" font-family="sans-serif" font-size="11" fill="#333">Plum</text>

  <circle cx="510" cy="525" r="8" fill="#ffa726" stroke="#e65100" stroke-width="1"/>
  <text   x="523" cy="525" y="529" font-family="sans-serif" font-size="11" fill="#333">Peach / Nectarine</text>

  <circle cx="670" cy="525" r="8" fill="#ffca28" stroke="#f57f17" stroke-width="1"/>
  <text   x="683" cy="525" y="529" font-family="sans-serif" font-size="11" fill="#333">Apricot</text>

  <circle cx="760" cy="525" r="8" fill="#8d6e63" stroke="#4e342e" stroke-width="1"/>
  <text   x="773" cy="525" y="529" font-family="sans-serif" font-size="11" fill="#333">Fig</text>

  <circle cx="95"  cy="555" r="8" fill="#7e57c2" stroke="#4527a0" stroke-width="1"/>
  <text   x="108" cy="555" y="559" font-family="sans-serif" font-size="11" fill="#333">Mulberry</text>

  <circle cx="200" cy="555" r="8" fill="#ef9a9a" stroke="#c62828" stroke-width="1"/>
  <text   x="213" cy="555" y="559" font-family="sans-serif" font-size="11" fill="#333">Quince</text>

  <circle cx="310" cy="555" r="8" fill="#fff176" stroke="#f9a825" stroke-width="1"/>
  <text   x="323" cy="555" y="559" font-family="sans-serif" font-size="11" fill="#333">Lemon / Lime</text>

  <circle cx="440" cy="555" r="8" fill="#ff7043" stroke="#bf360c" stroke-width="1"/>
  <text   x="453" cy="555" y="559" font-family="sans-serif" font-size="11" fill="#333">Persimmon</text>

  <circle cx="570" cy="555" r="8" fill="#ef5350" stroke="#b71c1c" stroke-width="1"/>
  <text   x="583" cy="555" y="559" font-family="sans-serif" font-size="11" fill="#333">Pomegranate</text>

  <circle cx="700" cy="555" r="8" fill="#aed645" stroke="#558b2f" stroke-width="1"/>
  <text   x="713" cy="555" y="559" font-family="sans-serif" font-size="11" fill="#333">Olive</text>

  <!-- Compass rose -->
  <g transform="translate(840,55)">
    <circle cx="0" cy="0" r="22" fill="white" fill-opacity="0.8" stroke="#777" stroke-width="1"/>
    <text x="0"  y="-8"  text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#333">N</text>
    <polygon points="0,-18 4,-4 0,2 -4,-4" fill="#c62828"/>
    <polygon points="0,18 4,4 0,-2 -4,4" fill="#777"/>
    <text x="0"  y="27"  text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">S</text>
    <text x="-25" y="4" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">W</text>
    <text x="25"  y="4" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">E</text>
  </g>

  <!-- Title banner -->
  <rect x="60" y="20" width="760" height="50" fill="white" fill-opacity="0.8" rx="8" stroke="#6a9a40" stroke-width="2"/>
  <text x="450" y="42" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#2e6020">The Promenade</text>
  <text x="450" y="62" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#4a7a30" font-style="italic">Miner's Point Community Orchard – Planting Site Map</text>
</svg>
